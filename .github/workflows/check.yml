name: Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  critical-checks:
    runs-on: ubuntu-latest
    env:
      SENSITIVE_GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run critical checks
        run: npm run check:critical
